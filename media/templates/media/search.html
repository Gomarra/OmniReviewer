<h2>Busca de Mídia (Teste API)</h2>

<form method="GET" action="{% url 'search_media' %}">
    <input type="text" name="q" placeholder="O que você está procurando?" value="{{ query|default:'' }}">
    
    <select name="category">
        <option value="">Todas as Mídias</option>
        <option value="MOVIE" {% if category_filter == 'MOVIE' %}selected{% endif %}>Filmes</option>
        <option value="GAME" {% if category_filter == 'GAME' %}selected{% endif %}>Jogos</option>
    </select>
    
    <button type="submit">Buscar</button>
</form>

<hr>

<div style="display: flex; flex-wrap: wrap; gap: 20px;">
    {% for item in results %}
        <div style="width: 200px; border: 1px solid #ccc; padding: 10px;">
            {% if item.image_url %}
                <img src="{{ item.image_url }}" alt="{{ item.title }}" style="width: 100%;">
            {% endif %}
            <h3>{{ item.title }}</h3>
            <p><small>{{ item.release_date }}</small></p>
            <a href="{% url 'media_detail' category=item.category external_id=item.external_id %}" style="text-decoration: none; background: #eee; padding: 5px; display: block; text-align: center;">Ver Detalhes</a>
        </div>
    {% empty %}
        {% if query %}
            <p>Nenhum resultado encontrado para "{{ query }}".</p>
        {% endif %}
    {% endfor %}
</div>
