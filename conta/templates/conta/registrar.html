{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; font-family: sans-serif;">
    
    <div style="background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 100%; max-width: 450px;">
        
        <h2 style="margin: 0 0 10px 0; color: #2c3e50; text-align: center;">Criar Nova Conta</h2>
        <p style="color: #7f8c8d; text-align: center; margin-bottom: 30px; font-size: 0.9em;">Junte-se à maior comunidade de entusiastas de mídias</p>

        <form method="POST" style="display: flex; flex-direction: column; gap: 20px;">
            {% csrf_token %}
            
            <div class="django-form-style">
                {{ form.as_p }}
            </div>

            <button type="submit" style="background-color: #27ae60; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 1em; font-weight: bold; cursor: pointer; transition: 0.2s;">
                Concluir Cadastro
            </button>
        </form>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">

        <p style="text-align: center; margin: 0; font-size: 0.9em; color: #7f8c8d;">
            Já possui uma conta? <a href="{% url 'login' %}" style="color: #3498db; text-decoration: none; font-weight: bold;">Faça login</a>
        </p>

    </div>
</div>

<style>
    .django-form-style p {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 15px;
        color: #34495e;
        font-weight: bold;
        font-size: 0.9em;
    }
    .django-form-style input {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 1em;
    }
    .django-form-style input:focus {
        border-color: #27ae60;
        outline: none;
    }
    /* Estilização para os textos de ajuda que o Django gera abaixo das senhas */
    .django-form-style .helptext {
        font-size: 0.75em;
        color: #95a5a6;
        font-weight: normal;
        margin-top: 2px;
    }
</style>
{% endblock %}
