<div style="max-width: 600px; margin: 40px auto; font-family: sans-serif; padding: 20px; border: 1px solid #dee2e6; border-radius: 8px;">
    <h2>Editar sua avaliação de: <span style="color: #3498db;">{{ review.media.title }}</span></h2>
    <p style="color: #6c757d;">Modifique seu texto ou mude seu status de recomendação abaixo.</p>
    
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button type="submit" style="padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Salvar Alterações</button>
            <a href="{% url 'profile' %}" style="padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px; text-align: center;">Cancelar</a>
        </div>
    </form>
</div>
