<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniReviewer</title>
</head>
<body style="margin: 0; padding: 0; font-family: sans-serif; background-color: #f8f9fa;">

    <nav style="background-color: #2c3e50; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        
        <a href="{% url 'home' %}" style="color: white; text-decoration: none; font-size: 1.4em; font-weight: bold; letter-spacing: 1px;">
            Omni<span style="color: #e67e22;">Reviewer</span>
        </a>

        <div style="display: flex; align-items: center; gap: 20px;">
            
            <a href="{% url 'search_media' %}" style="color: #bdc3c7; text-decoration: none; font-weight: bold; font-size: 0.9em;">Buscar</a>

            {% if user.is_authenticated %}
                <div style="display: flex; align-items: center; gap: 12px;">
                    
                    <a href="{% url 'profile' %}" style="display: flex; align-items: center; text-decoration: none; gap: 10px; background: #34495e; padding: 5px 12px; border-radius: 20px; border: 1px solid #4f5d73;">
                        <span style="color: white; font-size: 0.9em; font-weight: bold;">{{ user.username }}</span>
                        <img src="{{ user.profile.image.url }}" alt="Perfil" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid #e67e22;">
                    </a>

                    <form method="POST" action="{% url 'logout' %}" style="margin: 0; display: inline;">
                        {% csrf_token %}
                        <button type="submit" style="background-color: #c0392b; color: white; border: none; padding: 8px 14px; border-radius: 4px; font-weight: bold; font-size: 0.9em; cursor: pointer; transition: 0.2s;">
                            Sair
                        </button>
                    </form>

                </div>
            {% else %}
                <a href="{% url 'login' %}" style="color: white; background-color: #e67e22; text-decoration: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; font-size: 0.9em;">
                    Entrar
                </a>
            {% endif %}

        </div>
    </nav>

    <div style="padding: 20px;">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
